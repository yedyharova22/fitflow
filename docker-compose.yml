services:
  postgres:
    image: postgres:16-alpine
    container_name: fitflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitflow
      POSTGRES_PASSWORD: fitflow
      POSTGRES_DB: fitflow
    ports:
      - "5432:5432"
    volumes:
      - fitflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitflow -d fitflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fitflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fitflow_pg_data:
  fitflow_redis_data:
