# Deploy FitFlow to a VPS when main is updated.
# Skips until GitHub Actions secrets are configured (see docs/deployment-setup-guide.md).

name: Deploy main

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy until secrets are configured
        if: ${{ secrets.DEPLOY_HOST == '' }}
        run: |
          echo "::notice title=Deploy skipped::Add repository secrets DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, and DEPLOY_PATH (see docs/deployment-setup-guide.md Part 5)."
          exit 0

      - name: Deploy via SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
