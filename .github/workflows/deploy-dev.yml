# Deploy FitFlow dev server when main is updated.
# Requires GitHub Actions secrets (see docs/deployment-setup-guide.md Part 5).

name: Deploy dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            # Build one service at a time — avoids OOM on small VPS (4 GB RAM)
            docker compose -f docker-compose.prod.yml build api
            docker compose -f docker-compose.prod.yml build worker
            docker compose -f docker-compose.prod.yml build web
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
